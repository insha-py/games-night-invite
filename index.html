<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Word</title>

  <style>
    body {
      background-color: #121213;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 10px;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 10px;
      font-size: 1.8rem;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, min(12vw, 60px));
      grid-gap: 6px;
      justify-content: center;
      margin-top: 20px;
    }

    .tile {
      width: min(12vw, 60px);
      height: min(12vw, 60px);
      border: 2px solid #3a3a3c;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: min(6vw, 2rem);
      font-weight: bold;
      text-transform: uppercase;
    }

    .correct, .key.correct { background-color: #538d4e !important; border: none; }
    .present, .key.present { background-color: #b59f3b !important; border: none; }
    .absent, .key.absent { background-color: #3a3a3c !important; border: none; }

    #keyboard {
      margin-top: 25px;
    }

    .key-row {
      margin: 5px 0;
    }

    .key {
      padding: 15px 10px;
      margin: 2px;
      border-radius: 4px;
      border: none;
      background-color: #818384;
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .key.large {
      padding: 15px 14px;
    }

    #message {
      margin-top: 15px;
      font-size: 1rem;
      min-height: 20px;
      font-weight: bold;
    }

    /* POP-UP MODAL STYLES */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    #invite-modal {
      background-color: #1a1a1b;
      border: 2px solid #538d4e;
      padding: 40px 20px;
      border-radius: 15px;
      max-width: 90%;
      width: 400px;
      position: relative;
      transform: scale(0.7);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      to { transform: scale(1); }
    }

    #invite-title {
      color: #538d4e;
      font-size: 2rem;
      margin-top: 0;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 1.5rem;
      color: #818384;
    }
  </style>
</head>

<body>

<h1>Guess the Word</h1>

<div id="grid"></div>
<div id="message"></div>
<div id="keyboard"></div>

<div id="modal-overlay">
  <div id="invite-modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2 id="invite-title">🎉 Congratulations!</h2>
    <p id="invite-status" style="font-size: 1.2rem;"></p>
    <p style="font-size: 1.1rem;">To <b>Insha & Prithvij's Games Night</b></p>
    <hr style="border: 0.5px solid #3a3a3c; margin: 20px 0;">
    <p>🗓 Saturday, 11th April</p>
    <p>⏰ 8:30 PM</p>
    <p>📍 RH 3, 609</p>
    <button onclick="closeModal()" style="margin-top: 20px; padding: 10px 20px; background: #538d4e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">See you there!</button>
  </div>
</div>

<script>
  const answer = "LOSER";
  let currentRow = 0;
  let currentGuess = "";
  let validWords = [];
  let wordsLoaded = false;

  const grid = document.getElementById("grid");
  const message = document.getElementById("message");
  const keyboard = document.getElementById("keyboard");
  const overlay = document.getElementById("modal-overlay");

  // Load words
  fetch("words.txt")
    .then(r => r.text())
    .then(text => {
      validWords = text.split("\n").map(w => w.trim().toUpperCase()).filter(w => w.length === 5);
      if (!validWords.includes(answer)) validWords.push(answer);
      wordsLoaded = true;
      message.textContent = "";
    })
    .catch(() => {
      validWords = ["LOSER","GAMES", "TABLE", "BOARD", "CHESS", "CARDS"];
      wordsLoaded = true;
    });

  for (let i = 0; i < 30; i++) {
    const tile = document.createElement("div");
    tile.classList.add("tile");
    tile.id = "tile-" + i;
    grid.appendChild(tile);
  }

  const keys = [
    ["Q","W","E","R","T","Y","U","I","O","P"],
    ["A","S","D","F","G","H","J","K","L"],
    ["ENTER","Z","X","C","V","B","N","M","DEL"]
  ];

  keys.forEach(row => {
    const rowDiv = document.createElement("div");
    rowDiv.classList.add("key-row");
    row.forEach(key => {
      const btn = document.createElement("button");
      btn.textContent = key;
      btn.classList.add("key");
      if (key === "ENTER" || key === "DEL") btn.classList.add("large");
      btn.onclick = () => handleInput(key);
      rowDiv.appendChild(btn);
    });
    keyboard.appendChild(rowDiv);
  });

  document.addEventListener("keydown", (e) => {
    if (/^[a-zA-Z]$/.test(e.key)) handleInput(e.key.toUpperCase());
    else if (e.key === "Enter") handleInput("ENTER");
    else if (e.key === "Backspace") handleInput("DEL");
  });

  function handleInput(key) {
    if (currentRow >= 6 || !wordsLoaded) return;
    if (key === "ENTER") {
      if (currentGuess.length !== 5) return;
      if (!validWords.includes(currentGuess)) {
        message.textContent = "Not a valid word";
        return;
      }
      checkGuess();
    } else if (key === "DEL") {
      currentGuess = currentGuess.slice(0, -1);
      updateGrid();
    } else if (currentGuess.length < 5) {
      currentGuess += key;
      updateGrid();
    }
  }

  function updateGrid() {
    message.textContent = "";
    for (let i = 0; i < 5; i++) {
      document.getElementById(`tile-${currentRow * 5 + i}`).textContent = currentGuess[i] || "";
    }
  }

  function checkGuess() {
    const rowStart = currentRow * 5;
    const guessArr = currentGuess.split("");
    const answerArr = answer.split("");
    const statuses = new Array(5).fill("absent");

    guessArr.forEach((l, i) => {
      if (l === answerArr[i]) {
        statuses[i] = "correct";
        answerArr[i] = null;
      }
    });

    guessArr.forEach((l, i) => {
      if (statuses[i] !== "correct" && answerArr.includes(l)) {
        statuses[i] = "present";
        answerArr[answerArr.indexOf(l)] = null;
      }
    });

    guessArr.forEach((l, i) => {
      const tile = document.getElementById(`tile-${rowStart + i}`);
      tile.classList.add(statuses[i]);
      
      const keyBtn = Array.from(document.querySelectorAll('.key')).find(b => b.textContent === l);
      if (keyBtn) {
        if (statuses[i] === "correct") {
          keyBtn.classList.remove("present", "absent");
          keyBtn.classList.add("correct");
        } else if (statuses[i] === "present" && !keyBtn.classList.contains("correct")) {
          keyBtn.classList.remove("absent");
          keyBtn.classList.add("present");
        } else if (statuses[i] === "absent" && !keyBtn.classList.contains("correct") && !keyBtn.classList.contains("present")) {
          keyBtn.classList.add("absent");
        }
      }
    });

    if (currentGuess === answer) {
      setTimeout(() => showInvite(true), 500);
      currentRow = 6;
    } else {
      currentGuess = "";
      currentRow++;
      if (currentRow === 6) setTimeout(() => showInvite(false), 500);
    }
  }

  function showInvite(isWin) {
    const title = document.getElementById("invite-title");
    const status = document.getElementById("invite-status");

    if (isWin) {
      title.textContent = "🎉 Congratulations!";
      status.textContent = "You are invited!";
    } else {
      title.textContent = "Oh no! But...";
      status.textContent = "You're still invited 😉";
    }

    overlay.style.display = "flex";
  }

  function closeModal() {
    overlay.style.display = "none";
  }
</script>

</body>
</html>
