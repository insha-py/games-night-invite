<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Night Invite 🎉</title>

  <style>
    body {
      background-color: #121213;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      grid-gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .tile {
      width: 60px;
      height: 60px;
      border: 2px solid #3a3a3c;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .correct {
      background-color: #538d4e;
      border: none;
    }

    .present {
      background-color: #b59f3b;
      border: none;
    }

    .absent {
      background-color: #3a3a3c;
      border: none;
    }

    #keyboard {
      margin-top: 30px;
    }

    .key-row {
      margin: 5px;
    }

    .key {
      padding: 10px 14px;
      margin: 2px;
      border-radius: 4px;
      border: none;
      background-color: #818384;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .key.large {
      padding: 10px 20px;
    }

    #message {
      margin-top: 20px;
      font-size: 1.2rem;
    }

    #invite {
      display: none;
      margin-top: 40px;
      padding: 20px;
      border: 2px solid #538d4e;
      border-radius: 10px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    #invite h2 {
      color: #538d4e;
    }
  </style>
</head>

<body>

<h1>🎮 Game Night Invite</h1>
<p>Guess the word to reveal your invite 😉</p>

<div id="grid"></div>
<div id="message"></div>

<div id="keyboard"></div>

<div id="invite">
  <h2>🎉 You're Invited!</h2>
  <p>You are invited to <b>Insha & Prithvij's Games Night</b></p>
  <p>🗓 Saturday, 4th April</p>
  <p>⏰ 8:00 PM</p>
</div>

<script>
  const answer = "GAMES";
  let currentRow = 0;
  let currentGuess = "";

  const grid = document.getElementById("grid");
  const message = document.getElementById("message");
  const keyboard = document.getElementById("keyboard");
  const invite = document.getElementById("invite");

  // Create grid
  for (let i = 0; i < 30; i++) {
    const tile = document.createElement("div");
    tile.classList.add("tile");
    tile.id = "tile-" + i;
    grid.appendChild(tile);
  }

  // Keyboard layout
  const keys = [
    ["Q","W","E","R","T","Y","U","I","O","P"],
    ["A","S","D","F","G","H","J","K","L"],
    ["ENTER","Z","X","C","V","B","N","M","DEL"]
  ];

  keys.forEach(row => {
    const rowDiv = document.createElement("div");
    rowDiv.classList.add("key-row");

    row.forEach(key => {
      const button = document.createElement("button");
      button.textContent = key;
      button.classList.add("key");

      if (key === "ENTER" || key === "DEL") {
        button.classList.add("large");
      }

      button.onclick = () => handleInput(key);
      rowDiv.appendChild(button);
    });

    keyboard.appendChild(rowDiv);
  });

  document.addEventListener("keydown", (e) => {
    if (/^[a-zA-Z]$/.test(e.key)) {
      handleInput(e.key.toUpperCase());
    } else if (e.key === "Enter") {
      handleInput("ENTER");
    } else if (e.key === "Backspace") {
      handleInput("DEL");
    }
  });

  function handleInput(key) {
    if (currentRow >= 6) return;

    if (key === "ENTER") {
      if (currentGuess.length === 5) {
        checkGuess();
      }
    } else if (key === "DEL") {
      currentGuess = currentGuess.slice(0, -1);
      updateGrid();
    } else {
      if (currentGuess.length < 5) {
        currentGuess += key;
        updateGrid();
      }
    }
  }

  function updateGrid() {
    for (let i = 0; i < 5; i++) {
      const tile = document.getElementById(`tile-${currentRow * 5 + i}`);
      tile.textContent = currentGuess[i] || "";
    }
  }

  function checkGuess() {
    for (let i = 0; i < 5; i++) {
      const tile = document.getElementById(`tile-${currentRow * 5 + i}`);
      const letter = currentGuess[i];

      if (letter === answer[i]) {
        tile.classList.add("correct");
      } else if (answer.includes(letter)) {
        tile.classList.add("present");
      } else {
        tile.classList.add("absent");
      }
    }

    if (currentGuess === answer) {
      message.innerHTML = "🎉 Correct!";
      invite.style.display = "block";
      currentRow = 6;
      return;
    }

    currentGuess = "";
    currentRow++;

    if (currentRow === 6) {
      message.innerHTML = "Still invited 😉 Scroll down!";
      invite.style.display = "block";
    }
  }
</script>

</body>
</html>
