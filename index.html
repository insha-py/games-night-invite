<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Word</title>

  <style>
    body {
      background-color: #121213;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 10px;
    }

    h1 {
      margin-top: 10px;
      font-size: 1.8rem;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, min(12vw, 60px));
      grid-gap: 6px;
      justify-content: center;
      margin-top: 20px;
    }

    .tile {
      width: min(12vw, 60px);
      height: min(12vw, 60px);
      border: 2px solid #3a3a3c;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: min(6vw, 2rem);
      font-weight: bold;
      text-transform: uppercase;
    }

    /* Combined status classes for tiles and keys */
    .correct, .key.correct { background-color: #538d4e !important; border: none; }
    .present, .key.present { background-color: #b59f3b !important; border: none; }
    .absent, .key.absent { background-color: #3a3a3c !important; border: none; }

    #keyboard {
      margin-top: 25px;
    }

    .key-row {
      margin: 5px 0;
    }

    .key {
      padding: 10px;
      margin: 2px;
      border-radius: 4px;
      border: none;
      background-color: #818384;
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      transition: background-color 0.3s;
    }

    .key.large {
      padding: 10px 14px;
    }

    #message {
      margin-top: 15px;
      font-size: 1rem;
      min-height: 20px;
    }

    #invite {
      display: none;
      margin-top: 30px;
      padding: 20px;
      border: 2px solid #538d4e;
      border-radius: 10px;
    }

    #invite h2 {
      color: #538d4e;
    }
  </style>
</head>

<body>

<h1>Guess the word</h1>

<div id="grid"></div>
<div id="message"></div>
<div id="keyboard"></div>

<div id="invite">
  <h2>🎉 You're Invited!</h2>
  <p>You are invited to <b>Insha & Prithvij's Games Night</b></p>
  <p>🗓 Saturday, 4th April</p>
  <p>⏰ 8:00 PM</p>
</div>

<script>
  const answer = "GAMES";
  let currentRow = 0;
  let currentGuess = "";
  let validWords = [];
  let wordsLoaded = false;

  const grid = document.getElementById("grid");
  const message = document.getElementById("message");
  const keyboard = document.getElementById("keyboard");
  const invite = document.getElementById("invite");

  // Load word list properly
  message.textContent = "Loading word list...";

  fetch("words.txt")
    .then(response => {
      if (!response.ok) throw new Error("Failed to load words.txt");
      return response.text();
    })
    .then(text => {
      validWords = text
        .split("\n")
        .map(w => w.trim().toUpperCase())
        .filter(w => w.length === 5);

      // Ensure the answer is in the valid list
      if (!validWords.includes(answer)) validWords.push(answer);

      wordsLoaded = true;
      message.textContent = "";
    })
    .catch(err => {
      console.error(err);
      message.textContent = "Error loading word list";
      // Fallback list so the game works even without the file
      validWords = ["GAMES", "TABLE", "BOARD", "CHESS", "CARDS"];
      wordsLoaded = true;
    });

  // Create grid
  for (let i = 0; i < 30; i++) {
    const tile = document.createElement("div");
    tile.classList.add("tile");
    tile.id = "tile-" + i;
    grid.appendChild(tile);
  }

  // Keyboard layout
  const keys = [
    ["Q","W","E","R","T","Y","U","I","O","P"],
    ["A","S","D","F","G","H","J","K","L"],
    ["ENTER","Z","X","C","V","B","N","M","DEL"]
  ];

  keys.forEach(row => {
    const rowDiv = document.createElement("div");
    rowDiv.classList.add("key-row");

    row.forEach(key => {
      const button = document.createElement("button");
      button.textContent = key;
      button.classList.add("key");
      button.setAttribute("data-key", key); // For easy selection later

      if (key === "ENTER" || key === "DEL") {
        button.classList.add("large");
      }

      button.onclick = () => handleInput(key);
      rowDiv.appendChild(button);
    });

    keyboard.appendChild(rowDiv);
  });

  document.addEventListener("keydown", (e) => {
    if (/^[a-zA-Z]$/.test(e.key)) handleInput(e.key.toUpperCase());
    else if (e.key === "Enter") handleInput("ENTER");
    else if (e.key === "Backspace") handleInput("DEL");
  });

  function handleInput(key) {
    if (currentRow >= 6) return;
    if (!wordsLoaded) return;

    if (key === "ENTER") {
      if (currentGuess.length !== 5) return;
      if (!validWords.includes(currentGuess)) {
        message.textContent = "Not a valid word";
        return;
      }
      checkGuess();
    } 
    else if (key === "DEL") {
      currentGuess = currentGuess.slice(0, -1);
      updateGrid();
    } 
    else {
      if (currentGuess.length < 5) {
        currentGuess += key;
        updateGrid();
      }
    }
  }

  function updateGrid() {
    message.textContent = "";
    for (let i = 0; i < 5; i++) {
      const tile = document.getElementById(`tile-${currentRow * 5 + i}`);
      tile.textContent = currentGuess[i] || "";
    }
  }

  function checkGuess() {
    const rowStart = currentRow * 5;
    const guessArray = currentGuess.split("");
    const answerArray = answer.split("");
    const tileStatuses = new Array(5).fill("absent");

    // Pass 1: Check for Greens (Correct)
    guessArray.forEach((letter, i) => {
      if (letter === answerArray[i]) {
        tileStatuses[i] = "correct";
        answerArray[i] = null; // Mark as "used" in the answer
      }
    });

    // Pass 2: Check for Yellows (Present)
    guessArray.forEach((letter, i) => {
      if (tileStatuses[i] !== "correct" && answerArray.includes(letter)) {
        tileStatuses[i] = "present";
        answerArray[answerArray.indexOf(letter)] = null; // Mark as "used"
      }
    });

    // Update Grid UI and Keyboard UI
    guessArray.forEach((letter, i) => {
      const tile = document.getElementById(`tile-${rowStart + i}`);
      const status = tileStatuses[i];
      
      // Update Tile
      tile.classList.add(status);

      // Update Keyboard Button
      const keyBtn = document.querySelector(`.key[data-key="${letter}"]`);
      if (keyBtn) {
        if (status === "correct") {
          keyBtn.classList.remove("present", "absent");
          keyBtn.classList.add("correct");
        } else if (status === "present" && !keyBtn.classList.contains("correct")) {
          keyBtn.classList.remove("absent");
          keyBtn.classList.add("present");
        } else if (status === "absent" && !keyBtn.classList.contains("correct") && !keyBtn.classList.contains("present")) {
          keyBtn.classList.add("absent");
        }
      }
    });

    if (currentGuess === answer) {
      message.textContent = "🎉 Correct!";
      invite.style.display = "block";
      currentRow = 6;
      return;
    }

    currentGuess = "";
    currentRow++;

    if (currentRow === 6) {
      message.textContent = "Still invited 😉";
      invite.style.display = "block";
    }
  }
</script>

</body>
</html>
